<svg width="320" height="192" viewBox="0 0 320 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="320" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="50%" stop-color="#EF476F"/>
      <stop offset="100%" stop-color="#4D9DE0"/>
    </linearGradient>
    <linearGradient id="play-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="320" height="192" rx="24" fill="url(#bg-grad)"/>
  <!-- Decorative circles -->
  <circle cx="40" cy="30" r="18" fill="#FFD166" opacity="0.3"/>
  <circle cx="290" cy="150" r="22" fill="#06D6A0" opacity="0.25"/>
  <circle cx="280" cy="40" r="12" fill="#FFD166" opacity="0.2"/>
  <circle cx="50" cy="160" r="14" fill="#4D9DE0" opacity="0.2"/>
  <!-- Play button circle -->
  <circle cx="160" cy="72" r="32" fill="white" opacity="0.95"/>
  <polygon points="150,56 150,88 176,72" fill="url(#play-grad)"/>
  <!-- Stars -->
  <polygon points="80,50 83,58 91,58 85,63 87,71 80,66 73,71 75,63 69,58 77,58" fill="#FFD166" opacity="0.6"/>
  <polygon points="250,80 252,86 258,86 253,89 255,95 250,92 245,95 247,89 242,86 248,86" fill="#FFD166" opacity="0.5"/>
  <!-- Text: PopiLearn -->
  <text x="160" y="130" text-anchor="middle" font-family="'Baloo Thambi 2', 'Nunito', sans-serif" font-size="36" font-weight="800" fill="white" letter-spacing="1">
    PopiLearn
  </text>
  <!-- Tagline -->
  <text x="160" y="158" text-anchor="middle" font-family="'Nunito', sans-serif" font-size="13" font-weight="600" fill="white" opacity="0.85">
    ¡Canta, baila, pop! y aprende
  </text>
</svg>
